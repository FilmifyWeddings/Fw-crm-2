<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #666;">
        <div style="text-align: center;">
          <h2 style="margin-bottom: 10px;">LensFlow CRM</h2>
          <p id="loading-status">Loading application...</p>
          <div id="error-display" style="display: none; color: #ef4444; margin-top: 20px; padding: 15px; border: 1px solid #fee2e2; border-radius: 8px; background: #fef2f2; max-width: 400px; font-size: 12px; font-family: monospace; white-space: pre-wrap; text-align: left;"></div>
        </div>
      </div>
    </div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDisplay = document.getElementById('error-display');
        const loadingStatus = document.getElementById('loading-status');
        if (errorDisplay) {
          errorDisplay.style.display = 'block';
          errorDisplay.textContent = 'Error: ' + message + '\nAt: ' + source + ':' + lineno + ':' + colno;
        }
        if (loadingStatus) {
          loadingStatus.textContent = 'App failed to load.';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
